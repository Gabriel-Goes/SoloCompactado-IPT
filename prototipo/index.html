<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protótipo Sprint 1 | Trator na Fazenda</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #d6d1c4;
        --panel: rgba(24, 28, 26, 0.78);
        --panel-border: rgba(255, 255, 255, 0.16);
        --text: #eef5ef;
        --muted: rgba(238, 245, 239, 0.72);
        --accent: #ffd166;
        --tractor-shadow: rgba(18, 22, 20, 0.24);
        --error: rgba(134, 28, 28, 0.9);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        position: relative;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.28), transparent 28%),
          linear-gradient(180deg, rgba(54, 70, 58, 0.14), rgba(214, 209, 196, 0.04));
      }

      #map {
        width: 100%;
        height: 100%;
        background: #c4b58d;
      }

      .leaflet-container {
        background: #c4b58d;
        outline: none;
      }

      .leaflet-control-container {
        display: none;
      }

      #tractor-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 500;
        width: 76px;
        height: 76px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .tractor-core {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        transform: rotate(0deg);
        filter: drop-shadow(0 14px 18px var(--tractor-shadow));
      }

      .tractor-core::before {
        content: "";
        position: absolute;
        width: 68px;
        height: 68px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 209, 102, 0.22), transparent 70%);
        z-index: -1;
      }

      .tractor-emoji {
        font-size: 42px;
        line-height: 1;
        transform: translateY(-1px) rotate(90deg);
      }

      .tractor-ring {
        position: absolute;
        inset: 6px;
        border: 2px solid rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.2) inset;
      }

      .tractor-heading {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 20px;
        transform: translate(-50%, -34px);
        transform-origin: center 34px;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), rgba(255, 209, 102, 0.16));
      }

      #hud-hint {
        position: absolute;
        left: 18px;
        bottom: 18px;
        z-index: 450;
        min-width: 280px;
        max-width: 420px;
        padding: 12px 14px;
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        color: var(--text);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
      }

      #hud-hint strong {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent);
      }

      #hud-hint span {
        display: block;
        font-size: 14px;
        color: var(--muted);
      }

      #debug-overlay {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 550;
        min-width: 260px;
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: rgba(20, 22, 27, 0.84);
        color: var(--text);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(14px);
      }

      #debug-overlay[hidden] {
        display: none;
      }

      .debug-title {
        margin: 0 0 12px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .debug-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 4px 0;
        font-size: 13px;
      }

      .debug-row span:first-child {
        color: var(--muted);
      }

      #map-error {
        position: absolute;
        top: 18px;
        left: 50%;
        z-index: 600;
        display: none;
        width: min(540px, calc(100vw - 32px));
        padding: 14px 16px;
        transform: translateX(-50%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        background: var(--error);
        color: #fff6f6;
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.22);
      }

      #map-error.visible {
        display: block;
      }

      #map-error strong {
        display: block;
        margin-bottom: 5px;
        font-size: 13px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      #map-error span {
        font-size: 14px;
        line-height: 1.4;
      }

      @media (max-width: 720px) {
        #tractor-overlay {
          width: 66px;
          height: 66px;
        }

        .tractor-emoji {
          font-size: 36px;
        }

        #hud-hint {
          right: 14px;
          min-width: unset;
        }

        #debug-overlay {
          top: auto;
          right: 14px;
          bottom: 96px;
          left: 14px;
          min-width: unset;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="map" aria-label="Mapa satelital da Fazenda Paladino"></div>

      <div id="tractor-overlay" aria-hidden="true">
        <div class="tractor-core" id="tractor-core">
          <div class="tractor-ring"></div>
          <div class="tractor-heading"></div>
          <div class="tractor-emoji">🚜</div>
        </div>
      </div>

      <div id="map-error" role="alert" aria-live="polite">
        <strong>Falha na camada satelital</strong>
        <span id="map-error-message">Nao foi possivel carregar a camada Esri World Imagery.</span>
      </div>

      <div id="debug-overlay" hidden>
        <p class="debug-title">Debug da Navegacao</p>
        <div class="debug-row"><span>Latitude</span><span id="debug-lat">-</span></div>
        <div class="debug-row"><span>Longitude</span><span id="debug-lng">-</span></div>
        <div class="debug-row"><span>Heading</span><span id="debug-heading">-</span></div>
        <div class="debug-row"><span>Velocidade</span><span id="debug-speed">-</span></div>
        <div class="debug-row"><span>Teclas</span><span id="debug-keys">-</span></div>
      </div>

      <div id="hud-hint">
        <strong>Controle do Trator</strong>
        <span>Use ↑ para avançar, ←/→ para esterçar, ↓ para frear e D para alternar o debug.</span>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (function () {
        const FARM_CENTER = { lat: -13.098074, lng: -45.846229 };
        const INITIAL_ZOOM = 16;
        const METERS_PER_DEGREE_LAT = 111320;
        const MAX_DELTA_MS = 48;

        const tractorState = {
          position: { ...FARM_CENTER },
          headingDeg: 0,
          speedMps: 0,
          maxSpeedMps: 50,
          turnRateDegPerSec: 110,
          accelerationMps2: 16,
          brakeRateMps2: 20,
        };

        const inputState = {
          up: false,
          down: false,
          left: false,
          right: false,
        };

        const debugState = {
          enabled: false,
          lastFrameMs: 0,
        };

        const app = document.getElementById("app");
        const tractorCore = document.getElementById("tractor-core");
        const debugOverlay = document.getElementById("debug-overlay");
        const mapError = document.getElementById("map-error");
        const mapErrorMessage = document.getElementById("map-error-message");

        const debugLat = document.getElementById("debug-lat");
        const debugLng = document.getElementById("debug-lng");
        const debugHeading = document.getElementById("debug-heading");
        const debugSpeed = document.getElementById("debug-speed");
        const debugKeys = document.getElementById("debug-keys");

        function showFatalError(message) {
          mapError.classList.add("visible");
          mapErrorMessage.textContent = message;
        }

        if (!window.L) {
          showFatalError("Leaflet nao foi carregado. Verifique a conexao e recarregue a pagina.");
          return;
        }

        function createMap() {
          const map = L.map("map", {
            center: [FARM_CENTER.lat, FARM_CENTER.lng],
            zoom: INITIAL_ZOOM,
            zoomControl: false,
            attributionControl: false,
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            boxZoom: false,
            keyboard: false,
            tap: false,
            touchZoom: false,
          });

          const esriWorldImagery = L.tileLayer(
            "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            {
              maxZoom: 19,
              maxNativeZoom: 16,
            }
          );

          esriWorldImagery.on("tileerror", function () {
            showFatalError(
              "Nao foi possivel carregar a camada Esri World Imagery. A demo permanece aberta para diagnostico."
            );
          });

          esriWorldImagery.addTo(map);
          return map;
        }

        const map = createMap();

        function clamp(value, min, max) {
          return Math.min(Math.max(value, min), max);
        }

        function moveForward(position, headingDeg, distanceMeters) {
          const headingRad = (headingDeg * Math.PI) / 180;
          const deltaNorthMeters = Math.cos(headingRad) * distanceMeters;
          const deltaEastMeters = Math.sin(headingRad) * distanceMeters;
          const lat = position.lat + deltaNorthMeters / METERS_PER_DEGREE_LAT;
          const metersPerDegreeLng =
            METERS_PER_DEGREE_LAT * Math.cos((position.lat * Math.PI) / 180);
          const lng = position.lng + deltaEastMeters / Math.max(metersPerDegreeLng, 1);

          return { lat, lng };
        }

        function attachKeyboardControls() {
          window.addEventListener("keydown", function (event) {
            if (event.key === "ArrowUp") {
              inputState.up = true;
              event.preventDefault();
            } else if (event.key === "ArrowDown") {
              inputState.down = true;
              event.preventDefault();
            } else if (event.key === "ArrowLeft") {
              inputState.left = true;
              event.preventDefault();
            } else if (event.key === "ArrowRight") {
              inputState.right = true;
              event.preventDefault();
            } else if (event.key === "d" || event.key === "D") {
              debugState.enabled = !debugState.enabled;
              debugOverlay.hidden = !debugState.enabled;
              event.preventDefault();
            }
          });

          window.addEventListener("keyup", function (event) {
            if (event.key === "ArrowUp") {
              inputState.up = false;
            } else if (event.key === "ArrowDown") {
              inputState.down = false;
            } else if (event.key === "ArrowLeft") {
              inputState.left = false;
            } else if (event.key === "ArrowRight") {
              inputState.right = false;
            }
          });

          app.addEventListener("pointerdown", function () {
            window.focus();
          });
        }

        function updateTractorState(deltaMs) {
          const deltaSeconds = deltaMs / 1000;
          const turningLeft = inputState.left && !inputState.right;
          const turningRight = inputState.right && !inputState.left;

          if (turningLeft) {
            tractorState.headingDeg =
              tractorState.headingDeg - tractorState.turnRateDegPerSec * deltaSeconds;
          } else if (turningRight) {
            tractorState.headingDeg =
              tractorState.headingDeg + tractorState.turnRateDegPerSec * deltaSeconds;
          }

          if (inputState.up) {
            tractorState.speedMps = clamp(
              tractorState.speedMps + tractorState.accelerationMps2 * deltaSeconds,
              0,
              tractorState.maxSpeedMps
            );
          } else if (inputState.down) {
            tractorState.speedMps = clamp(
              tractorState.speedMps - tractorState.brakeRateMps2 * deltaSeconds,
              0,
              tractorState.maxSpeedMps
            );
          } else {
            tractorState.speedMps = clamp(
              tractorState.speedMps - 0.55 * deltaSeconds,
              0,
              tractorState.maxSpeedMps
            );
          }

          const distanceMeters = tractorState.speedMps * deltaSeconds;
          if (distanceMeters > 0) {
            tractorState.position = moveForward(
              tractorState.position,
              tractorState.headingDeg,
              distanceMeters
            );
          }
        }

        function setCameraPosition() {
          map.setView([tractorState.position.lat, tractorState.position.lng], map.getZoom(), {
            animate: false,
            pan: {
              animate: false,
            },
          });
        }

        function renderTractorOverlay() {
          tractorCore.style.transform = "rotate(" + tractorState.headingDeg + "deg)";
        }

        function renderDebug() {
          if (!debugState.enabled) return;

          debugLat.textContent = tractorState.position.lat.toFixed(6);
          debugLng.textContent = tractorState.position.lng.toFixed(6);
          const normalizedHeading = ((tractorState.headingDeg % 360) + 360) % 360;
          debugHeading.textContent = normalizedHeading.toFixed(1) + "°";
          debugSpeed.textContent = tractorState.speedMps.toFixed(2) + " m/s";
          debugKeys.textContent = Object.entries(inputState)
            .filter(function (entry) {
              return entry[1];
            })
            .map(function (entry) {
              return entry[0];
            })
            .join(", ") || "nenhuma";
        }

        let lastTimestamp = null;

        function tick(timestamp) {
          if (lastTimestamp === null) {
            lastTimestamp = timestamp;
          }

          const deltaMs = Math.min(timestamp - lastTimestamp, MAX_DELTA_MS);
          lastTimestamp = timestamp;
          debugState.lastFrameMs = deltaMs;

          updateTractorState(deltaMs);
          setCameraPosition();
          renderTractorOverlay();
          renderDebug();

          window.requestAnimationFrame(tick);
        }

        attachKeyboardControls();
        renderTractorOverlay();
        setCameraPosition();
        window.requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
